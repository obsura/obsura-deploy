name: obsura-single-node

services:
  volume-init:
    image: ghcr.io/obsura/obsura-api:replace-with-release-tag
    restart: "no"
    user: "0:0"
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      uid="$(id -u obsura 2>/dev/null || echo 1000)"
      gid="$(id -g obsura 2>/dev/null || echo 1000)"
      mkdir -p /var/lib/obsura/uploads /var/lib/obsura/outputs
      chown -R "${uid}:${gid}" /var/lib/obsura
      chmod -R u+rwX,go-rwx /var/lib/obsura
    volumes:
      - obsura-data:/var/lib/obsura

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: obsura
      POSTGRES_USER: obsura
      POSTGRES_PASSWORD: replace-with-strong-password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    image: ghcr.io/obsura/obsura-api:replace-with-release-tag
    restart: unless-stopped
    env_file:
      - ../../env/api.env
    environment:
      OBSURA_ENV: production
      OBSURA_STORAGE_ROOT: /var/lib/obsura
      DATABASE_URL: postgresql+psycopg://obsura:replace-with-strong-password@postgres:5432/obsura
    depends_on:
      postgres:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    volumes:
      - obsura-data:/var/lib/obsura
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  obsura-data:
  postgres-data:
